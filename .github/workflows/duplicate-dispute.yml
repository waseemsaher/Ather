name: Handle Duplicate Disputes

on:
  schedule:
    # Run hourly to check for 👎 reactions
    - cron: "0 * * * *"
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  dispute:
    name: Scan Duplicate Disputes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check for disputes (single issue on comment trigger)
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request == null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bun run scripts/issue-automation/dispute-handler.ts

      - name: Scan all duplicates (scheduled/manual trigger)
        if: github.event_name != 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: bun run scripts/issue-automation/dispute-handler.ts

      - name: Summary header
        if: always()
        run: |
          echo "## 🔄 Duplicate Dispute Handler" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
